<!-- # ====== templates/index.html ====== -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&D Map Master - Web</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
</head>
<body>
  <div id="main">
    <aside id="sidebar">
      <h2>D&D Map Master</h2>
      <label id="map-label">Загрузить карту<input type="file" name="map_image" accept="image/*" onchange="autoUploadMap(this)" hidden /></label>
    <div class="section">
    <details open>
    <summary>Сетка</summary>
    <div class="grid-control">
      <input type="number" id="gridInput" min="10" max="200" value="20" oninput="syncGridInputs(this.value)" />
      <input type="range" id="gridSlider" min="10" max="200" value="20" oninput="syncGridInputs(this.value)" />
    </div>
    </details>
    <div class="section">
    <details open>
      <summary>Скрытые области</summary>
      
      <button class="add-button" onclick="addZone()">
        Создать зону
        <span class="add-icon">+</span>
      </button>
      <ul id="zoneList"></ul>
    </details>
  </div>

  <!-- Токены -->
  <div class="section">
    <details open>
      <summary>Токены персонажей</summary>
      <button class="add-button" onclick="addToken()">
        Создать токен
        <span class="add-icon">+</span>
      </button>
      <ul id="tokenList"></ul>
    </details>
  </div>

  <!-- Находки -->
  <div class="section">
    <details open>
      <summary>Находки</summary>
      <button class="add-button" onclick="openFindModal()">
        Создать находку
        <span class="add-icon">+</span>
      </button>
      <ul id="findList"></ul>
    </details>
  </div>
    </aside>
    <section id="canvas-container">
      <div id="toolButtons">
        <button id="gridToggle" class="tool-button" title="Показать/скрыть сетку">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M7 2v20M17 2v20m5-15H2m20 10H2"/>
          </svg>
        </button>
        <button id="rulerToggle" class="tool-button" title="Линейка">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
            <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="m6.344 12l2.121 2.122m.707-4.95l2.121 2.12M12 6.344l2.122 2.122M5.07 13.273l8.202-8.203c.792-.792 1.188-1.188 1.645-1.336a2 2 0 0 1 1.236 0c.456.148.852.544 1.643 1.335L18.93 6.2c.792.792 1.188 1.19 1.337 1.646c.13.402.13.834 0 1.235c-.149.457-.545.853-1.337 1.645l-8.202 8.203c-.792.792-1.189 1.188-1.645 1.336c-.402.13-.834.13-1.235 0c-.457-.148-.854-.544-1.646-1.336l-1.133-1.133c-.79-.791-1.187-1.187-1.335-1.643a2 2 0 0 1 0-1.236c.148-.457.545-.853 1.337-1.645" />
          </svg>
        </button>
      </div>
      <canvas id="mapCanvas"></canvas>
    </section>
  </div>
  <div id="tokenModal" class="modal" style="display:none;">
  <div class="modal-content large-modal">
    <span class="close" onclick="closeTokenModal()">&times;</span>
    <h3>Создание токена персонажа</h3>

    <!-- Тип токена -->
    <div class="token-type-buttons">
      <button data-type="player" class="type-btn active">Игрок</button>
      <button data-type="npc" class="type-btn">НПС</button>
      <button data-type="enemy" class="type-btn">Враг</button>
    </div>

    <div class="token-form">
      <!-- Аватар -->
      <div class="avatar-upload" id="avatarUpload">
        <input type="file" id="avatarInput" accept="image/*" hidden onchange="handleAvatarUpload(this)">
        <div class="avatar-upload">
        <div id="avatarDropzone" onclick="document.getElementById('avatarFile').click()">
          <img id="avatarPreview" src="" alt="Avatar" style="display: none;" />
          <div id="avatarMask" class="circle-mask" style="display: none;"></div>
          <div id="editIcon" style="display: none;">✎</div>
          <input type="file" id="avatarFile" accept="image/*" style="display: none;" onchange="handleAvatarUpload(event)">
          <div id="avatarOverlay">
            <strong>Нажми для выбора</strong><br />
            <small>или перенеси сюда<br />PNG, JPG (макс. 2000x2000px)</small>
          </div>
        </div>
      </div>
      </div>

      <!-- Параметры -->
      <div class="token-fields">
        <label>Имя<br><input type="text" id="tokenName"></label>
        <div class="flex-row">
          <label>КД<br><input type="number" id="tokenAC" value="10"></label>
          <label>Макс. ОЗ<br><input type="number" id="tokenHP" value="10"></label>
        </div>
      </div>
    </div>

    <!-- Кнопки -->
    <div class="token-buttons">
      <button class="save-btn" onclick="submitToken()">Сохранить</button>
      <button class="cancel-btn" onclick="closeTokenModal()">Отменить</button>
    </div>
  </div>
</div>

<div id="findModal" class="modal" style="display: none;">
  <div class="modal-content large-modal">
    <span class="close" onclick="closeFindModal()">&times;</span>
    <h3>Создание находки</h3>

    <div class="token-form">
      <div class="token-fields">
        <label>Имя находки<br>
          <input type="text" id="findName">
        </label>

        <label>Описание<br>
          <textarea id="findDescription" rows="6" style="width: 100%; resize: vertical; font-family: Inter, sans-serif; font-size: 14px; padding: 6px; border-radius: 6px; border: 1px solid #ccc;"></textarea>
        </label>
      </div>
    </div>

    <div class="token-buttons">
      <button class="save-btn" onclick="submitFind()">Сохранить</button>
      <button class="cancel-btn" onclick="closeFindModal()">Отменить</button>
    </div>
  </div>
</div>
<div id="findTooltip" style="display: none;"></div>

<script src="{{ url_for('static', filename='js/map.js') }}"></script>
<iframe id="playerMini" src="/player" width="320" height="180" style="display: none;"></iframe>
<button id="togglePlayerMini" class="mini-toggle-btn"></button>
</body>
</html>
