<!-- # ====== templates/index.html ====== -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&D Map Master - Web</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
</head>
<body>
  <div id="main">
    <aside id="sidebar">
      <h2>D&D Map Master</h2>
      <label id="map-label">Загрузить карту<input type="file" name="map_image" accept="image/*" onchange="autoUploadMap(this)" hidden /></label>
      <label>Размер сетки (px):</label>
      <div style="display: flex; gap: 10px; align-items: center;">
        <input type="range" id="gridSlider" min="10" max="200" value="20" oninput="syncGridInputs(this.value)" />
        <input type="number" id="gridInput" min="10" max="200" value="20" oninput="syncGridInputs(this.value)" style="width: 60px;" />
      </div>
      <div class="section">
    <details open>
      <summary>Скрытые области</summary>
      
      <button class="add-button" onclick="addZone()">
        Создать зону
        <span class="add-icon">+</span>
      </button>
      <ul id="zoneList"></ul>
    </details>
  </div>

  <!-- Токены -->
  <div class="section">
    <details open>
      <summary>Токены персонажей</summary>
      <button class="add-button" onclick="addToken()">
        Создать токен
        <span class="add-icon">+</span>
      </button>
      <ul id="tokenList"></ul>
    </details>
  </div>

  <!-- Находки -->
  <div class="section">
    <details open>
      <summary>Находки</summary>
      <button class="add-button" onclick="addFind()">
        Создать находку
        <span class="add-icon">+</span>
      </button>
      <ul id="findList"></ul>
    </details>
  </div>
    </aside>
    <section id="canvas-container">
      <canvas id="mapCanvas"></canvas>
    </section>
  </div>
  <div id="tokenModal" class="modal" style="display:none;">
  <div class="modal-content">
    <span class="close" onclick="closeTokenModal()">&times;</span>
    <h3>Добавить персонажа</h3>

    <label>Имя:<br><input type="text" id="tokenName"></label><br><br>

    <label>Тип:</label><br>
    <label><input type="radio" name="tokenType" value="player" checked> Игрок</label><br>
    <label><input type="radio" name="tokenType" value="npc"> НПС</label><br>
    <label><input type="radio" name="tokenType" value="enemy"> Враг</label><br><br>

    <label><input type="checkbox" id="tokenDead"> Мёртв</label><br><br>

    <label>Аватар:<br><input type="file" accept="image/*" onchange="handleAvatarUpload(this)"></label><br><br>
    <canvas id="avatarPreview" width="100" height="100" style="border:1px solid #ccc;"></canvas>
    <input type="hidden" id="avatarData">

    <button onclick="submitToken()">Добавить</button>
  </div>
</div>
<script src="{{ url_for('static', filename='js/map.js') }}"></script>
</body>
</html>
