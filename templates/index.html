<!-- # ====== templates/index.html ====== -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&D Map Master - Web</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
</head>
<body>
  <div id="main">
    <aside id="sidebar">
      <h2>D&D Map Master</h2>
      <label id="map-label">Загрузить карту<input type="file" name="map_image" accept="image/*" onchange="autoUploadMap(this)" hidden /></label>
      <label>Размер сетки (px):</label>
      <div style="display: flex; gap: 10px; align-items: center;">
        <input type="range" id="gridSlider" min="10" max="200" value="20" oninput="syncGridInputs(this.value)" />
        <input type="number" id="gridInput" min="10" max="200" value="20" oninput="syncGridInputs(this.value)" style="width: 60px;" />
      </div>
      <div class="section">
    <details open>
      <summary>Скрытые области</summary>
      
      <button class="add-button" onclick="addZone()">
        Создать зону
        <span class="add-icon">+</span>
      </button>
      <ul id="zoneList"></ul>
    </details>
  </div>

  <!-- Токены -->
  <div class="section">
    <details open>
      <summary>Токены персонажей</summary>
      <button class="add-button" onclick="addToken()">
        Создать токен
        <span class="add-icon">+</span>
      </button>
      <ul id="tokenList"></ul>
    </details>
  </div>

  <!-- Находки -->
  <div class="section">
    <details open>
      <summary>Находки</summary>
      <button class="add-button" onclick="addFind()">
        Создать находку
        <span class="add-icon">+</span>
      </button>
      <ul id="findList"></ul>
    </details>
  </div>
    </aside>
    <section id="canvas-container">
      <canvas id="mapCanvas"></canvas>
    </section>
  </div>
  <div id="tokenModal" class="modal" style="display:none;">
  <div class="modal-content large-modal">
    <span class="close" onclick="closeTokenModal()">&times;</span>
    <h3>Создание токена персонажа</h3>

    <!-- Тип токена -->
    <div class="token-type-buttons">
      <button data-type="player" class="type-btn active">Игрок</button>
      <button data-type="npc" class="type-btn">НПС</button>
      <button data-type="enemy" class="type-btn">Враг</button>
    </div>

    <div class="token-form">
      <!-- Аватар -->
      <div class="avatar-upload" id="avatarUpload">
        <input type="file" id="avatarInput" accept="image/*" hidden onchange="handleAvatarUpload(this)">
        <div class="avatar-upload">
        <div id="avatarDropzone" onclick="document.getElementById('avatarFile').click()">
          <img id="avatarPreview" src="" alt="Avatar" style="display: none;" />
          <div id="avatarMask" class="circle-mask" style="display: none;"></div>
          <div id="editIcon" style="display: none;">✎</div>
          <input type="file" id="avatarFile" accept="image/*" style="display: none;" onchange="handleAvatarUpload(event)">
          <div id="avatarOverlay">
            <strong>Нажми для выбора</strong><br />
            <small>или перенеси сюда<br />PNG, JPG (макс. 2000x2000px)</small>
          </div>
        </div>
      </div>
      </div>

      <!-- Параметры -->
      <div class="token-fields">
        <label>Имя<br><input type="text" id="tokenName"></label>
        <div class="flex-row">
          <label>КД<br><input type="number" id="tokenAC" value="10"></label>
          <label>Макс. ОЗ<br><input type="number" id="tokenHP" value="10"></label>
        </div>
      </div>
    </div>

    <!-- Кнопки -->
    <div class="token-buttons">
      <button class="save-btn" onclick="submitToken()">Сохранить</button>
      <button class="cancel-btn" onclick="closeTokenModal()">Отменить</button>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/map.js') }}"></script>
</body>
</html>
