<!DOCTYPE html>
<html lang="ru">

<head>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
      background-color: #020617; /* Темный фон как у мастера */
    }

    #main {
      display: block;
      height: 100vh;
      width: 100vw;
      margin: 0;
      padding: 0;
      background-color: #020617;
    }

    #map {
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      position: relative;
      background-color: #020617;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #020617; /* Темный фон для canvas */
    }

    #mapDisabledImage {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 10;
      display: none;
    }
  </style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <title>D&D Карта — Игрок</title>
</head>

<body>
  <script>
    window.MAP_ID = "{{ map_id }}";
  </script>
  <div id="main">
    <section id="map">
      <img id="mapDisabledImage" src="/static/disabled.png" alt="Карта отключена" />
      <canvas id="mapCanvas"></canvas>
      <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
      <script src="{{ url_for('static', filename='js/player.js') }}"></script>
    </section>
  </div>
</body>

</html>
