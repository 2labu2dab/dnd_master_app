<!DOCTYPE html>
<html lang="ru">

<head>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
      background-color: #020617;
    }

    * {
      box-sizing: border-box;
    }

    #main {
      display: flex;
      height: 100vh;
      width: 100vw;
      margin: 0;
      padding: 0;
      background-color: #020617;
    }

    #map-container {
      flex: 1;
      position: relative;
      height: 100vh;
      transition: flex 0.3s ease;
      background-color: #020617;
    }

    #map {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      position: relative;
      background-color: #020617;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #020617;
    }

    #mapDisabledImage {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 10;
      display: none;
    }
    
    /* Стили для мини-карты (когда страница в iframe) */
    body.mini-map #portrait-sidebar.visible {
      width: 120px !important;
      padding: 5px !important;
    }
    
    body.mini-map .portrait-grid {
      gap: 2px !important;
    }
    
    body.mini-map .portrait-name {
      font-size: 7px !important;
      padding: 1px 2px !important;
      margin-top: 1px !important;
    }
  </style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <title>D&D Карта — Игрок</title>
</head>

<body>
  <script>
    window.MAP_ID = "{{ map_id }}";
  </script>
  <div id="main">
    <div id="map-container">
      <section id="map">
        <img id="mapDisabledImage" src="/static/disabled.png" alt="Карта отключена" />
        <canvas id="mapCanvas"></canvas>
      </section>
    </div>
    <div id="portrait-sidebar">
      <div id="portrait-list"></div>
    </div>
  </div>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="{{ url_for('static', filename='js/player.js') }}"></script>
</body>

</html>
