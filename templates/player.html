<!DOCTYPE html>
<html lang="ru">

<head>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      width: 100%;
      background-color: #020617;
    }

    #main {
      display: flex;
      height: 100vh;
      width: 100vw;
      margin: 0;
      padding: 0;
      background-color: #020617;
    }

    #map-container {
      flex: 1;
      position: relative;
      height: 100vh;
      transition: flex 0.3s ease;
      background-color: #020617;
    }

    #map {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      position: relative;
      background-color: #020617;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #020617;
    }

    #mapDisabledImage {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 10;
      display: none;
    }

    /* Сайдбар для портретов - как на схеме */
    #portrait-sidebar {
      width: 0;
      height: 100vh;
      background: linear-gradient(180deg, #111827 0%, #020617 100%);
      border-left: 1px solid rgba(148, 163, 184, 0.2);
      box-shadow: -4px 0 18px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      transition: width 0.3s ease;
      display: flex;
      flex-direction: column;
      padding: 0;
      box-sizing: border-box;
    }

    #portrait-sidebar.visible {
      width: 30%;
      padding: 20px;
    }

    #portrait-sidebar h3 {
      margin: 0 0 20px 0;
      color: #f9fafb;
      font-size: 18px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      flex-shrink: 0;
    }

    #portrait-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center; /* Центрируем по вертикали */
      gap: 20px;
      overflow: hidden;
      padding: 10px 0;
    }

    .portrait-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      animation: portraitFadeIn 0.3s ease;
      width: 100%;
    }

    @keyframes portraitFadeIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .portrait-avatar {
      border-radius: 12px;
      object-fit: cover;
      background: #2a2a3b;
      transition: all 0.2s;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .portrait-name {
      font-family: 'Inter', sans-serif;
      color: #e5e7eb;
      font-weight: 500;
      text-align: center;
      font-size: 16px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 10px;
    }

    /* Адаптация для мобильных устройств */
    @media (max-width: 768px) {
      #portrait-sidebar.visible {
        width: 40%;
        padding: 15px;
      }
      
      .portrait-name {
        font-size: 14px;
      }
    }
  </style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <title>D&D Карта — Игрок</title>
</head>

<body>
  <script>
    window.MAP_ID = "{{ map_id }}";
  </script>
  <div id="main">
    <div id="map-container">
      <section id="map">
        <img id="mapDisabledImage" src="/static/disabled.png" alt="Карта отключена" />
        <canvas id="mapCanvas"></canvas>
      </section>
    </div>
    <div id="portrait-sidebar">
      <div id="portrait-list"></div>
    </div>
  </div>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="{{ url_for('static', filename='js/player.js') }}"></script>
</body>

</html>
