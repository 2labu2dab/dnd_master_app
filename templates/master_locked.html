<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Мастер уже активен</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative&family=Cinzel:wght@400;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/player-theme.css') }}" />
</head>

<body class="player-dnd master-lock-page">
  <div class="player-master-absent master-lock-screen" style="display: flex;" aria-live="polite">
    <div class="player-master-absent-frame">
      <div class="player-master-absent-panel">
        <div class="master-lock-icon-wrap" aria-hidden="true">
          <svg class="master-lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <p class="player-master-absent-kicker">Сессия занята</p>
        <p class="player-master-absent-title">Мастер может быть только один</p>
        <div class="player-master-absent-rule" aria-hidden="true"></div>
        <p class="player-master-absent-hint">В данный момент другой мастер ведет игру.<br>Съебись.</p>

        <div class="master-lock-timer" id="timer" aria-label="Секунд до следующей проверки">30</div>

        <button type="button" class="master-lock-btn" onclick="checkMasterStatus()">
          Проверить статус
        </button>

        <p class="master-lock-status" id="statusMessage">Проверка статуса каждые 5 секунд…</p>
      </div>
    </div>
  </div>

  <script>
    let countdown = 30;
    const timerElement = document.getElementById('timer');
    const statusMessage = document.getElementById('statusMessage');

    function updateTimer() {
      timerElement.textContent = countdown;
      if (countdown <= 0) {
        checkMasterStatus();
      }
    }

    function checkMasterStatus() {
      fetch('/api/master/status')
        .then(response => response.json())
        .then(data => {
          if (!data.active) {
            window.location.href = '/';
          } else {
            countdown = 30;
            statusMessage.textContent = 'Мастер всё ещё активен. Ожидайте…';
          }
        })
        .catch(error => {
          console.error('Error checking master status:', error);
          statusMessage.textContent = 'Ошибка проверки статуса';
        });

      countdown = 30;
    }

    setInterval(() => {
      countdown--;
      updateTimer();
    }, 1000);

    setInterval(checkMasterStatus, 5000);

    checkMasterStatus();
  </script>
</body>

</html>
